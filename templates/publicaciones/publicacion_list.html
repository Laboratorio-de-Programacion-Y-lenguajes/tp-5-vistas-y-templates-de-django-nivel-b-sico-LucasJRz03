<!-- 
    TODO: Completar el template de listado de publicaciones.

    Requisitos:
    - Extender base.html
    - Sobreescribir {% block content %}
    - Dentro del bloque:
        - Un título de sección (<h1> o <h2>)
        - Recorrer la lista con {% for pub in publicacion_list %}
        - Por cada publicación mostrar:
            - Título ({{ pub.titulo }})
            - Autor ({{ pub.autor }})
            - Fecha de publicación ({{ pub.fecha_publicacion }})
            - Un link al detalle usando {% url 'publicaciones:detalle_publicacion' pub.pk %}
        - Cerrar con {% endfor %}
        - Si no hay publicaciones, usar {% empty %} dentro del for para mostrar un mensaje 
-->

{% extends "base.html" %}

{% block content %}
   <h2>Listado de Publicaciones</h2>

   {% for pub in publicacion_list %}
       <article>
         <h3>{{ pub.titulo }}</h3>
         <p> Autor: {{ pub.autor }}</p>
         <p> Fecha de publicación: {{ pub.fecha_publicacion }}</p>
         <a href="{% url 'publicaciones:detalle_publicacion' pub.pk %}">Ver detalle</a>
       </article>
       <hr>
    {% empty %}
       <p>No hay publicaciones disponibles.</p>
    {% endfor %}
{% endblock %}
