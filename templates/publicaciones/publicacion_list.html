{% extends "base.html" %}

{% block content %}
<h2>Listado de Publicaciones</h2>

{% for pub in publicacion_list %}
<article>
    <h3>{{ pub.titulo }}</h3>
    <p>Autor: {{ pub.autor }}</p>
    <p>Fecha de publicación: {{ pub.fecha_publicacion }}</p>
    <a href="{% url 'publicaciones:detalle_publicacion' pub.pk %}">Ver detalle</a>
</article>
<hr>
{% empty %}
<p>No hay publicaciones disponibles.</p>
{% endfor %}
{% endblock %}
